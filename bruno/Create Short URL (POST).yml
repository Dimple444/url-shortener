info:
  name: Create Short URL (POST)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/urls/shorten"
  body:
    type: json
    data: |-
      {
        "longUrl": "https://example.com",
        "expiryDays": 300
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const jsonData = res.getBody();
        if(jsonData.shortUrl) {
          const parts = jsonData.shortUrl.split('/');
          const code = parts[parts.length - 1];
          bru.setEnvVar("shortCode", code);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.shortUrl
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
