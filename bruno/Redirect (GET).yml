info:
  name: Redirect (GET)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/v1/urls/{{shortCode}}"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "302"
    - expression: res.headers.location
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 5
